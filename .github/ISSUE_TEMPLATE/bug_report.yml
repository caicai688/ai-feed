name: Bug Report
description: 报告一个 Bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题！请填写以下信息帮助我们定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug
      placeholder: 告诉我们发生了什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 访问 '...'
        2. 点击 '...'
        3. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，添加截图帮助说明问题

  - type: dropdown
    id: browsers
    attributes:
      label: 浏览器
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 其他

  - type: textarea
    id: context
    attributes:
      label: 额外信息
      description: 添加任何其他相关信息
